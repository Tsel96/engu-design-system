<!doctype html>
<!-- @dsCard group="Components" name="Inputs · Text area" subtitle="Multiline · char counter" viewport="700x260" -->
<html><head><meta charset="utf-8"><title>Text area</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 18px 22px; gap: 14px; min-height: auto; }
  section { display: flex; flex-direction: column; gap: 10px; }
  h3 { margin: 0; font: 700 14px/1 var(--font-body); color: var(--fg-1); letter-spacing: -0.005em; }
  .cap { font: 500 11px/1 var(--font-body); letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); }
  .ico { width: 16px; height: 16px; flex-shrink: 0; }
  .ico-20 { width: 20px; height: 20px; flex-shrink: 0; }
  .ico-24 { width: 24px; height: 24px; flex-shrink: 0; }
</style>
</head><body><div class="card">
  <label style="display:flex; flex-direction:column; gap:8px; max-width:480px; margin:0 auto; width:100%">
    <span style="font:600 13px/1.2 'Inter Display'; color:var(--fg-1)">Notes</span>
    <textarea rows="5" style="font:500 15px/1.45 'Inter Display'; padding:14px 16px; border:1px solid rgba(0,0,0,0.1); border-radius:14px; background:#fff; outline:none; resize:vertical; color:var(--fg-1)">Anezka liked the forest puzzle but found the city builder too long. Maybe save it for the weekend.</textarea>
    <div style="display:flex; justify-content:space-between; font:500 12px/1 'Inter Display'; color:var(--fg-3)">
      <span>Visible to teachers only</span>
      <span>117 / 500</span>
    </div>
  </label>
</div></body></html>
