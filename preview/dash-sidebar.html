<!doctype html>
<!-- @dsCard group="Components" name="Dashboard · Sidebar" subtitle="Side nav · logo · nav items · upgrade / promo cards" viewport="760x540" -->
<html><head><meta charset="utf-8"><title>Dashboard sidebar</title>
<link rel="stylesheet" href="_card.css">
</head><body><div class="card" style="padding: 18px 22px">
<div style="display:flex; gap:24px; justify-content:center; align-items:flex-start; min-height:480px">
  <!-- Default sidebar (Home active, Settings inactive) -->
  <aside style="width:270px; height:480px; background:#FFF5CC; border-radius:16px; display:flex; flex-direction:column; padding:8px; box-shadow: 0 1px 2px rgba(0,0,0,0.04)">
    <div style="padding:18px 16px 8px; display:flex; align-items:center">
      <img src="../assets/engu-horizontal-green.svg" alt="engu" style="height:24px">
    </div>
    <nav style="display:flex; flex-direction:column; gap:2px; padding:8px 0">
      <button style="background:rgba(0,0,0,0.06); color:rgba(0,0,0,0.9); border:none; border-radius:14px; padding:14px 16px; font:700 14px/1.2 'Inter Display'; letter-spacing:-0.01em; text-align:left; cursor:pointer; display:flex; align-items:center; gap:12px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </button>
      <button style="background:transparent; color:rgba(0,0,0,0.7); border:none; border-radius:14px; padding:14px 16px; font:500 14px/1.2 'Inter Display'; letter-spacing:-0.01em; text-align:left; cursor:pointer; display:flex; align-items:center; gap:12px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </button>
    </nav>
    <div style="margin-top:auto; display:flex; flex-direction:column; gap:8px; padding:0 8px 8px">
      <div style="background:rgba(0,0,0,0.05); border-radius:14px; padding:14px; position:relative">
        <div style="font:500 13px/1.2 'Inter Display'; color:#332900; letter-spacing:-0.01em">Welcome bonus</div>
        <div style="font:500 11px/1.3 'Inter Display'; color:rgba(0,0,0,0.5); margin-top:4px">Finish your profile to unlock 10 extra assets</div>
        <button aria-label="dismiss" style="position:absolute; top:10px; right:10px; background:none; border:none; color:rgba(0,0,0,0.4); cursor:pointer; width:16px; height:16px; padding:0">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m18 6-12 12M6 6l12 12"/></svg>
        </button>
      </div>
      <div style="background:var(--engu-green); color:#fff; border-radius:14px; padding:14px; display:flex; flex-direction:column; gap:4px">
        <div style="display:flex; align-items:center; gap:8px; font:700 13px/1.2 'Inter Display'; letter-spacing:-0.01em">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 3 14h7l-1 8 10-12h-7z"/></svg>
          Upgrade
        </div>
        <div style="font:500 11px/1.3 'Inter Display'; opacity:0.84">Free trial ends in 14 days</div>
      </div>
    </div>
  </aside>
  <!-- States stack -->
  <div style="display:flex; flex-direction:column; gap:8px; align-self:center; max-width:240px">
    <div class="cap">States</div>
    <button style="background:rgba(0,0,0,0.06); color:rgba(0,0,0,0.9); border:none; border-radius:14px; padding:14px 16px; font:700 14px/1.2 'Inter Display'; letter-spacing:-0.01em; text-align:left; cursor:pointer; display:flex; align-items:center; gap:12px">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      Active / pressed
    </button>
    <button style="background:rgba(0,0,0,0.03); color:rgba(0,0,0,0.85); border:none; border-radius:14px; padding:14px 16px; font:600 14px/1.2 'Inter Display'; letter-spacing:-0.01em; text-align:left; cursor:pointer; display:flex; align-items:center; gap:12px">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>
      Hover
    </button>
    <button style="background:transparent; color:rgba(0,0,0,0.7); border:none; border-radius:14px; padding:14px 16px; font:500 14px/1.2 'Inter Display'; letter-spacing:-0.01em; text-align:left; cursor:pointer; display:flex; align-items:center; gap:12px">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>
      Default
    </button>
    <div class="lbl" style="margin-top:8px">270px · yellow-50 bg · 14px radius items</div>
  </div>
</div></div></body></html>
