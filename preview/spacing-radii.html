<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing · Radii" subtitle="Derived from spacing scale · 4-pt steps" viewport="700x180" -->
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_card.css">
</head><body><div class="card">
  <div class="row" style="gap:10px; justify-content:space-between; align-items:flex-end">
    <!-- radii derived from the spacing scale (4-pt steps) -->
    <div class="col" style="gap:5px; align-items:center; flex:1; min-width:0"><div style="width:100%; aspect-ratio:1; background:var(--engu-green); border-radius:0px"></div><div class="lbl" style="font-size:10px">none</div><div style="font:500 9px/1 ui-monospace,Menlo,monospace; color:var(--fg-3)">0</div></div>
    <div class="col" style="gap:5px; align-items:center; flex:1; min-width:0"><div style="width:100%; aspect-ratio:1; background:var(--engu-green); border-radius:4px"></div><div class="lbl" style="font-size:10px">2xs</div><div style="font:500 9px/1 ui-monospace,Menlo,monospace; color:var(--fg-3)">4</div></div>
    <div class="col" style="gap:5px; align-items:center; flex:1; min-width:0"><div style="width:100%; aspect-ratio:1; background:var(--engu-green); border-radius:8px"></div><div class="lbl" style="font-size:10px">xs</div><div style="font:500 9px/1 ui-monospace,Menlo,monospace; color:var(--fg-3)">8</div></div>
    <div class="col" style="gap:5px; align-items:center; flex:1; min-width:0"><div style="width:100%; aspect-ratio:1; background:var(--engu-green); border-radius:12px"></div><div class="lbl" style="font-size:10px">sm</div><div style="font:500 9px/1 ui-monospace,Menlo,monospace; color:var(--fg-3)">12</div></div>
    <div class="col" style="gap:5px; align-items:center; flex:1; min-width:0"><div style="width:100%; aspect-ratio:1; background:var(--engu-green); border-radius:16px"></div><div class="lbl" style="font-size:10px">md</div><div style="font:500 9px/1 ui-monospace,Menlo,monospace; color:var(--fg-3)">16</div></div>
    <div class="col" style="gap:5px; align-items:center; flex:1; min-width:0"><div style="width:100%; aspect-ratio:1; background:var(--engu-green); border-radius:20px"></div><div class="lbl" style="font-size:10px">lg</div><div style="font:500 9px/1 ui-monospace,Menlo,monospace; color:var(--fg-3)">20</div></div>
    <div class="col" style="gap:5px; align-items:center; flex:1; min-width:0"><div style="width:100%; aspect-ratio:1; background:var(--engu-green); border-radius:24px"></div><div class="lbl" style="font-size:10px">xl</div><div style="font:500 9px/1 ui-monospace,Menlo,monospace; color:var(--fg-3)">24</div></div>
    <div class="col" style="gap:5px; align-items:center; flex:1; min-width:0"><div style="width:100%; aspect-ratio:1; background:var(--engu-green); border-radius:32px"></div><div class="lbl" style="font-size:10px">2xl</div><div style="font:500 9px/1 ui-monospace,Menlo,monospace; color:var(--fg-3)">32</div></div>
    <div class="col" style="gap:5px; align-items:center; flex:1; min-width:0"><div style="width:100%; aspect-ratio:1; background:var(--engu-green); border-radius:48px"></div><div class="lbl" style="font-size:10px">3xl</div><div style="font:500 9px/1 ui-monospace,Menlo,monospace; color:var(--fg-3)">48</div></div>
    <div class="col" style="gap:5px; align-items:center; flex:1; min-width:0"><div style="width:100%; aspect-ratio:1; background:var(--engu-green); border-radius:999px"></div><div class="lbl" style="font-size:10px">pill</div><div style="font:500 9px/1 ui-monospace,Menlo,monospace; color:var(--fg-3)">∞</div></div>
  </div>
  <div class="cap" style="text-align:center">Derived from the 4-pt spacing scale · doubles every 2 steps</div>
</div></body></html>
