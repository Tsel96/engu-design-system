<!doctype html>
<!-- @dsCard group="Spacing" name="Type · Font stack" subtitle="Apparat · Piazzolla · Inter Display" viewport="700x200" -->
<html><head><meta charset="utf-8"><title>Font stack</title>
<link rel="stylesheet" href="_card.css">
</head><body><div class="card">
  <div class="col" style="gap:14px">
    <div class="row" style="gap:18px; align-items:baseline">
      <div style="font: 900 30px/1 var(--font-display); letter-spacing:-0.03em; color:var(--engu-green-ink); width:220px">Apparat</div>
      <div class="lbl">Display, headlines, hero — Heavy 900</div>
    </div>
    <div class="row" style="gap:18px; align-items:baseline">
      <div style="font: 900 italic 30px/1 'Piazzolla', Georgia, serif; letter-spacing:-0.02em; color:var(--engu-green-ink); width:220px">Piazzolla</div>
      <div class="lbl">Italic accent only — Black Italic 900</div>
    </div>
    <div class="row" style="gap:18px; align-items:baseline">
      <div style="font: 500 28px/1 var(--font-body); letter-spacing:-0.005em; color:var(--engu-green-ink); width:220px">Inter Display</div>
      <div class="lbl">Body, UI, labels — Regular 400 → Bold 700</div>
    </div>
  </div>
</div></body></html>
