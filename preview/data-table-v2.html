<!doctype html>
<!-- @dsCard group="Components" name="Data · Table v2" subtitle="Sort · selection toolbar · hover · zebra rows" viewport="760x340" -->
<html><head><meta charset="utf-8"><title>Data · Table v2</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 20px 24px; gap: 14px; min-height: auto; }
  h3 { margin: 0; font: 700 14px/1 var(--font-body); color: var(--color-fg-primary); letter-spacing: -0.005em; }
  .cap { font: 500 11px/1 var(--font-body); letter-spacing: 0.14em; text-transform: uppercase; color: var(--color-fg-tertiary); }
  .ico { width: 16px; height: 16px; flex-shrink: 0; }
  .ico-20 { width: 20px; height: 20px; flex-shrink: 0; }
  .ico-24 { width: 24px; height: 24px; flex-shrink: 0; }
</style>
</head><body><div class="card">
<style>
  .t2 {
    background: #fff; border-radius: var(--radius-md);
    box-shadow: var(--shadow-card); overflow: hidden;
    width: 100%; max-width: 640px; margin: 0 auto;
  }
  .t2-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid var(--color-border-subtle);
    background: #fff;
  }
  .t2-toolbar .selection {
    font: 600 13px/1 var(--font-body); color: var(--color-fg-brand-strong);
    letter-spacing: -0.005em;
  }
  .t2-toolbar .actions { display: flex; gap: 6px; }
  .t2-toolbar .pill-btn {
    background: #fff; border: 1px solid var(--color-border-default); border-radius: 999px;
    padding: 6px 12px; font: 600 12px/1 var(--font-body);
    color: var(--color-fg-primary); cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  }
  .t2-toolbar .pill-btn.danger { color: var(--color-intent-error); border-color: rgba(192,58,58,0.3); }
  table.t2-table { width: 100%; border-collapse: collapse; }
  table.t2-table thead { position: sticky; top: 0; background: var(--color-bg-tinted); z-index: 1; }
  table.t2-table th {
    text-align: left; padding: 10px 16px;
    font: 500 11px/1 var(--font-body); letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--color-fg-brand-strong); white-space: nowrap;
    border-bottom: 1px solid var(--color-border-subtle);
  }
  table.t2-table th.sortable { cursor: pointer; user-select: none; }
  table.t2-table th .sort {
    display: inline-flex; vertical-align: middle; margin-left: 4px;
    color: var(--color-fg-tertiary);
  }
  table.t2-table th.is-sorted .sort { color: var(--color-fg-brand-strong); }
  table.t2-table th.checkbox-cell, table.t2-table td.checkbox-cell { width: 32px; padding: 8px 0 8px 14px; }
  table.t2-table tbody tr { transition: background var(--dur-micro) var(--ease-out); }
  table.t2-table tbody tr:nth-child(even) { background: #FCFCFC; }
  table.t2-table tbody tr:hover { background: var(--color-bg-tinted); }
  table.t2-table tbody tr.is-selected { background: color-mix(in srgb, var(--color-bg-brand) 8%, white); }
  table.t2-table td {
    padding: 12px 16px; vertical-align: middle;
    font: 500 14px/1.2 var(--font-body); color: var(--color-fg-primary);
    letter-spacing: -0.005em; border-bottom: 1px solid var(--color-border-subtle);
  }
  table.t2-table tbody tr:last-child td { border-bottom: 0; }
  table.t2-table td.muted { color: var(--color-fg-tertiary); font-weight: 500; }
  .check { width: 18px; height: 18px; border: 1.5px solid #636869; border-radius: 5px; background: #fff; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; box-sizing: border-box; }
  .check.is-on { background: var(--color-bg-brand); border-color: var(--color-bg-brand); color: var(--color-fg-on-brand); }
  .check.is-indet { background: var(--color-bg-brand); border-color: var(--color-bg-brand); color: var(--color-fg-on-brand); }
  .check svg { width: 12px; height: 12px; }
</style>

  <div class="t2">
    <div class="t2-toolbar">
      <span class="selection">2 of 3 selected</span>
      <div class="actions">
        <button class="pill-btn"><svg class="ico" viewBox="0 0 24 24" fill="none"><use href="../assets/icons/engu-icons-sprite.svg#engu-pencil"/></svg> Edit</button>
        <button class="pill-btn"><svg class="ico" viewBox="0 0 24 24" fill="none"><use href="../assets/icons/engu-icons-sprite.svg#engu-arrow-out-of-box"/></svg> Export</button>
        <button class="pill-btn danger"><svg class="ico" viewBox="0 0 24 24" fill="none"><use href="../assets/icons/engu-icons-sprite.svg#engu-trash-can"/></svg> Remove</button>
      </div>
    </div>
    <table class="t2-table">
      <thead>
        <tr>
          <th class="checkbox-cell">
            <span class="check is-indet">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </span>
          </th>
          <th class="sortable is-sorted">Child <span class="sort"><svg class="ico" viewBox="0 0 24 24" fill="none"><use href="../assets/icons/engu-icons-sprite.svg#engu-chevron-bottom"/></svg></span></th>
          <th class="sortable">Adventures <span class="sort"><svg class="ico" viewBox="0 0 24 24" fill="none"><use href="../assets/icons/engu-icons-sprite.svg#engu-chevron-bottom"/></svg></span></th>
          <th class="sortable">Time <span class="sort"><svg class="ico" viewBox="0 0 24 24" fill="none"><use href="../assets/icons/engu-icons-sprite.svg#engu-chevron-bottom"/></svg></span></th>
          <th>Last active</th>
        </tr>
      </thead>
      <tbody>
        <tr class="is-selected">
          <td class="checkbox-cell"><span class="check is-on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span></td>
          <td><strong>Anežka</strong></td><td>24</td><td>6h 12m</td><td class="muted">2 hours ago</td>
        </tr>
        <tr class="is-selected">
          <td class="checkbox-cell"><span class="check is-on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span></td>
          <td><strong>Lukáš</strong></td><td>8</td><td>2h 04m</td><td class="muted">Yesterday</td>
        </tr>
        <tr>
          <td class="checkbox-cell"><span class="check"></span></td>
          <td><strong>Matěj</strong></td><td>17</td><td>4h 38m</td><td class="muted">3 days ago</td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="cap" style="text-align: center; padding-top: 6px">Sortable headers · selection toolbar · row hover · zebra rows</div>
</div></body></html>
