<!doctype html>
<!-- @dsCard group="Components" name="Feedback · Snackbar" subtitle="Success · error · info pills" viewport="700x220" -->
<html><head><meta charset="utf-8"><title>Snackbar</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 18px 22px; gap: 14px; min-height: auto; }
  .ico-20 { width: 20px; height: 20px; flex-shrink: 0; }
  .snack {
    background: var(--engu-green-ink);
    color: #fff;
    padding: 10px 10px 10px 16px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font: 500 14px/1 var(--font-body);
    letter-spacing: -0.005em;
  }
  .snack > .icon  { display: inline-flex; align-items: center; }
  .snack > .text  { padding: 0 4px; }
  .snack > .action {
    background: var(--engu-green);
    color: #fff;
    border: 0;
    border-radius: 999px;
    padding: 8px 14px;
    font: 700 13px/1 var(--font-body);
    letter-spacing: -0.005em;
    cursor: pointer;
  }
  .snack > .action:hover { background: #6BB58D; }
  .snack.no-action { padding-right: 16px; }
</style>
</head><body><div class="card">
  <div class="col" style="gap:10px; align-items:center">

    <div class="snack">
      <span class="icon" style="color:var(--engu-green)"><svg class="ico-20" viewBox="0 0 24 24" fill="none"><use href="../assets/icons/engu-icons-sprite.svg#engu-checkmark-1"/></svg></span>
      <span class="text">Settings saved</span>
      <button class="action">Undo</button>
    </div>

    <div class="snack">
      <span class="icon" style="color:#FF7B7B"><svg class="ico-20" viewBox="0 0 24 24" fill="none"><use href="../assets/icons/engu-icons-sprite.svg#engu-warning-sign"/></svg></span>
      <span class="text">Couldn't save — check your connection</span>
      <button class="action">Retry</button>
    </div>

    <div class="snack no-action">
      <span class="icon" style="color:#FFD633"><svg class="ico-20" viewBox="0 0 24 24" fill="none"><use href="../assets/icons/engu-icons-sprite.svg#engu-circle-info"/></svg></span>
      <span class="text">New adventure pack available</span>
    </div>

  </div>
</div></body></html>
