<!doctype html>
<!-- @dsCard group="Components" name="Dashboard · Upgrade hero card" subtitle="Apparat heading on green + on ink · yellow CTA" viewport="820x500" -->
<html><head><meta charset="utf-8"><title>Upgrade hero card</title>
<link rel="stylesheet" href="_card.css">
</head><body><div class="card" style="padding: 18px 22px">
<div style="display:flex; gap:14px; justify-content:center">
  <div style="width:380px; height:440px; background:var(--engu-green); border-radius:24px; padding:24px; display:flex; flex-direction:column; justify-content:space-between; color:#fff; position:relative; overflow:hidden">
    <img src="../assets/engu-logomark-white.svg" alt="" aria-hidden="true" style="position:absolute; right:-60px; bottom:-60px; width:280px; opacity:0.14">
    <div style="display:flex; flex-direction:column; gap:10px; position:relative">
      <h2 style="margin:0; font:900 48px/0.84 var(--font-display); letter-spacing:-0.04em; color:#FFEB99">Upgrade your plan</h2>
      <p style="margin:16px 0 0; font:500 17px/1.45 'Inter Display'; color:#fff; max-width:300px; letter-spacing:-0.01em">Your free trial will expire in 12 days. Keep the adventures coming.</p>
    </div>
    <button style="align-self:flex-start; background:#FFEB99; color:#332900; border:1px solid rgba(0,0,0,0.1); font:700 18px/1 'Inter Display'; letter-spacing:-0.01em; padding:20px 32px; border-radius:999px; cursor:pointer; box-shadow: var(--shadow-button)">Upgrade</button>
  </div>

  <div style="width:380px; height:440px; background:var(--engu-green-ink); border-radius:24px; padding:24px; display:flex; flex-direction:column; justify-content:space-between; color:#fff; position:relative; overflow:hidden">
    <img src="../assets/engu-logomark-green.svg" alt="" aria-hidden="true" style="position:absolute; right:-60px; bottom:-60px; width:280px; opacity:0.32">
    <div style="display:flex; flex-direction:column; gap:10px; position:relative">
      <span style="font:500 11px/1 'Inter Display'; letter-spacing:0.16em; text-transform:uppercase; color:#FFD633">Lite plan</span>
      <h2 style="margin:0; font:900 44px/0.86 var(--font-display); letter-spacing:-0.04em; color:var(--engu-green)">Go further with<br><span style="color: #FFD633; font-family: var(--font-accent); font-style: italic; letter-spacing: 0px">complete.</span></h2>
      <p style="margin:16px 0 0; font:500 17px/1.45 'Inter Display'; color:rgba(255,255,255,0.78); max-width:300px; letter-spacing:-0.01em">Unlimited adventures, 3 seats, parent dashboard.</p>
    </div>
    <button style="align-self:flex-start; background:#FFEB99; color:#332900; border:1px solid rgba(0,0,0,0.1); font:700 18px/1 'Inter Display'; letter-spacing:-0.01em; padding:20px 32px; border-radius:999px; cursor:pointer; box-shadow: var(--shadow-button)">Compare plans</button>
  </div>
</div></div></body></html>
