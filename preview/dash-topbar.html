<!doctype html>
<!-- @dsCard group="Components" name="Dashboard · Top bar" subtitle="Breadcrumb · plan badge · user identity · logout" viewport="760x200" -->
<html><head><meta charset="utf-8"><title>Dashboard top bar</title>
<link rel="stylesheet" href="_card.css">
</head><body><div class="card" style="padding: 18px 22px">
<div style="background:rgba(255,255,255,0.8); border-radius:14px 14px 0 0; display:flex; align-items:center; justify-content:space-between; padding:16px 48px; min-height:52px; box-shadow: inset 0 -1px 0 rgba(0,0,0,0.05)">
  <span style="font:500 14px/1 'Inter Display'; color:rgba(0,0,0,0.9); letter-spacing:-0.01em">Home</span>
  <div style="display:flex; align-items:center; gap:12px">
    <span style="background:rgba(0,0,0,0.05); color:rgba(0,0,0,0.5); border-radius:40px; padding:5px 10px; font:500 12px/1 'Inter Display'">Free trial</span>
    <span style="font:500 14px/1 'Inter Display'; color:rgba(0,0,0,0.9); letter-spacing:-0.01em">email@email.com</span>
    <button style="background:transparent; border:none; color:rgba(0,0,0,0.5); cursor:pointer; padding:4px; display:flex" aria-label="log out">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</div>
<div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center; padding-top:14px">
  <span style="background:rgba(0,0,0,0.05); color:rgba(0,0,0,0.5); border-radius:40px; padding:5px 10px; font:500 12px/1 'Inter Display'">Free trial</span>
  <span style="background:var(--engu-cream); color:var(--engu-green-text); border-radius:40px; padding:5px 10px; font:500 12px/1 'Inter Display'">Lite</span>
  <span style="background:var(--engu-green); color:#fff; border-radius:40px; padding:5px 10px; font:500 12px/1 'Inter Display'">Complete</span>
  <span style="background:#FFEB99; color:#332900; border-radius:40px; padding:5px 10px; font:500 12px/1 'Inter Display'">Trial · 12 days left</span>
  <span style="background:rgba(192,58,58,0.12); color:#5C1A1A; border-radius:40px; padding:5px 10px; font:500 12px/1 'Inter Display'">Expired</span>
</div>
<div class="cap" style="text-align:center; padding-top:6px">Bar in top of main panel · plan pill + user identity + logout</div></div></body></html>
