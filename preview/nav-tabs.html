<!doctype html>
<!-- @dsCard group="Components" name="Nav · Tabs" subtitle="Underline tabs" viewport="700x200" -->
<html><head><meta charset="utf-8"><title>Tabs</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 18px 22px; gap: 14px; min-height: auto; }
  section { display: flex; flex-direction: column; gap: 10px; }
  h3 { margin: 0; font: 700 14px/1 var(--font-body); color: var(--fg-1); letter-spacing: -0.005em; }
  .cap { font: 500 11px/1 var(--font-body); letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); }
  .ico { width: 16px; height: 16px; flex-shrink: 0; }
  .ico-20 { width: 20px; height: 20px; flex-shrink: 0; }
  .ico-24 { width: 24px; height: 24px; flex-shrink: 0; }
</style>
</head><body><div class="card">
  <div class="col" style="gap:16px">
    <div style="border-bottom:1px solid rgba(0,0,0,0.08); display:flex; gap:0">
      <button style="background:none; border:none; padding:12px 18px; font:700 14px/1 'Inter Display'; color:var(--engu-green-text); border-bottom:2px solid var(--engu-green); cursor:pointer">Overview</button>
      <button style="background:none; border:none; padding:12px 18px; font:600 14px/1 'Inter Display'; color:var(--fg-2); cursor:pointer">Progress</button>
      <button style="background:none; border:none; padding:12px 18px; font:600 14px/1 'Inter Display'; color:var(--fg-2); cursor:pointer">Reports</button>
      <button style="background:none; border:none; padding:12px 18px; font:600 14px/1 'Inter Display'; color:var(--fg-2); cursor:pointer">Settings</button>
    </div>
    <div style="background:#fff; border-radius:14px; padding:18px; box-shadow:0 1px 2px rgba(0,0,0,0.04)">
      <div style="font:500 13px/1.5 'Inter Display'; color:var(--fg-2)">Overview content lives here. Switching tabs swaps this region.</div>
    </div>
  </div>
</div></body></html>
