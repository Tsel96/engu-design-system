<!doctype html>
<!-- @dsCard group="Components" name="Feedback · Nudge" subtitle="Soft yellow tip card" viewport="700x160" -->
<html><head><meta charset="utf-8"><title>Nudge</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 18px 22px; gap: 14px; min-height: auto; }
  section { display: flex; flex-direction: column; gap: 10px; }
  h3 { margin: 0; font: 700 14px/1 var(--font-body); color: var(--fg-1); letter-spacing: -0.005em; }
  .cap { font: 500 11px/1 var(--font-body); letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); }
  .ico { width: 16px; height: 16px; flex-shrink: 0; }
  .ico-20 { width: 20px; height: 20px; flex-shrink: 0; }
  .ico-24 { width: 24px; height: 24px; flex-shrink: 0; }
</style>
</head><body><div class="card">
  <div class="col" style="gap:14px; max-width:380px; margin:0 auto; width:100%">
    <div style="background:#FFEB99; border-radius:14px; padding:14px 16px; display:flex; gap:12px; align-items:center">
      <div style="width:40px; height:40px; border-radius:999px; background:#FFD633; color:#332900; display:flex; align-items:center; justify-content:center"><svg class="ico" viewBox="0 0 24 24" fill="none"><use href="../assets/icons/engu-icons-sprite.svg#engu-lightbulb-glow"/></svg></div>
      <div style="flex:1; font:500 13px/1.4 'Inter Display'; color:#332900">
        <strong>Did you know?</strong> You can invite up to 3 family members at no extra cost.
      </div>
      <button style="background:none; border:none; color:#332900; opacity:0.6; cursor:pointer; display:flex"><svg class="ico" viewBox="0 0 24 24" fill="none"><use href="../assets/icons/engu-icons-sprite.svg#engu-cross-medium"/></svg></button>
    </div>
  </div>
</div></body></html>
