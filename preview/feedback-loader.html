<!doctype html>
<!-- @dsCard group="Components" name="Feedback · Loaders" subtitle="Spinner · dots · progress bar" viewport="700x200" -->
<html><head><meta charset="utf-8"><title>Loaders</title>
<link rel="stylesheet" href="_card.css">
<style>
  section { display: flex; flex-direction: column; gap: 14px; }
  h3 { margin: 0; font: 700 14px/1 var(--font-body); color: var(--fg-1); letter-spacing: -0.005em; }
  .loader-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  .loader-cell {
    background: var(--engu-cream);
    border-radius: 14px;
    padding: 24px 14px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    min-height: 140px;
    justify-content: space-between;
  }
  .loader-name {
    font: 500 11px/1 var(--font-body);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--fg-3);
    text-align: center;
  }
  .loader-ink {
    background: var(--engu-green-ink);
    color: #fff;
  }
  .loader-ink .loader-name { color: rgba(255,255,255,0.55); }

  /* ───── 1. ENGU LOGOMARK PULSE ─────
     The brand 8-prong rotates with a yellow-tipped trail. */
  .logomark-spinner {
    width: 56px; height: 56px;
    color: var(--engu-green);
    animation: rotate-slow 1.8s linear infinite;
  }
  .logomark-spinner.is-mini { width: 32px; height: 32px; }
  @keyframes rotate-slow { to { transform: rotate(360deg); } }

  /* The logomark itself, drawn from the brand SVG */
  .logomark-svg {
    width: 100%; height: 100%;
    transform-origin: 50% 50%;
  }

  /* ───── 2. ADVENTURE BAR ─────
     Engu-cream track with a moving yellow flame + green fill */
  .adventure-bar {
    position: relative;
    width: 100%;
    max-width: 160px;
    height: 14px;
    border-radius: 999px;
    background: rgba(0,0,0,0.06);
    overflow: hidden;
  }
  .adventure-bar .fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, var(--engu-green-deep), var(--engu-green));
    border-radius: 999px;
    animation: adv-fill 2.4s ease-in-out infinite;
  }
  .adventure-bar .spark {
    position: absolute;
    top: 50%;
    width: 22px; height: 22px;
    transform: translate(-50%, -50%);
    color: #FFD633;
    animation: adv-spark 2.4s ease-in-out infinite;
  }
  @keyframes adv-fill {
    0%, 100% { width: 12%; }
    50%      { width: 78%; }
  }
  @keyframes adv-spark {
    0%, 100% { left: 12%; }
    50%      { left: 78%; }
  }

  /* ───── 3. STREAK PULSE ─────
     7 day-of-week tiles pulse in sequence (mirrors the streak widget) */
  .streak {
    display: flex;
    gap: 6px;
  }
  .streak-tile {
    width: 16px; height: 22px;
    border-radius: 5px;
    background: var(--engu-green);
    opacity: 0.2;
    animation: streak-pulse 1.6s ease-in-out infinite;
  }
  .streak-tile:nth-child(1) { animation-delay: 0s; }
  .streak-tile:nth-child(2) { animation-delay: 0.12s; }
  .streak-tile:nth-child(3) { animation-delay: 0.24s; }
  .streak-tile:nth-child(4) { animation-delay: 0.36s; }
  .streak-tile:nth-child(5) { animation-delay: 0.48s; }
  .streak-tile:nth-child(6) { animation-delay: 0.60s; }
  .streak-tile:nth-child(7) { animation-delay: 0.72s; }
  @keyframes streak-pulse {
    0%, 80%, 100% { opacity: 0.18; transform: scaleY(0.7); }
    40%           { opacity: 1; transform: scaleY(1); }
  }

  /* ───── 4. YELLOW DOT TRAIL ─────
     A pill of three dots, ink-on-green */
  .dot-trail {
    display: inline-flex;
    gap: 8px;
    background: rgba(255,255,255,0.06);
    padding: 8px 12px;
    border-radius: 999px;
  }
  .dot-trail .dot {
    width: 8px; height: 8px;
    border-radius: 999px;
    background: var(--engu-green);
    animation: dot-jump 1.2s ease-in-out infinite;
  }
  .dot-trail .dot:nth-child(1) { animation-delay: 0s; }
  .dot-trail .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot-trail .dot:nth-child(3) { animation-delay: 0.30s; background: #FFD633; }
  @keyframes dot-jump {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.45; }
    30%           { transform: translateY(-6px); opacity: 1; }
  }

  /* ───── 5. SCREEN LOADER (page take-over) ─────
     Big centered logomark on ink ground with subtle shimmer */
  .screen-loader {
    background: var(--engu-green-ink);
    border-radius: 18px;
    padding: 28px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    color: var(--engu-green);
  }
  .screen-loader .mark {
    width: 80px; height: 80px;
    animation: mark-breathe 2s ease-in-out infinite;
  }
  .screen-loader .ring {
    width: 96px; height: 96px;
    position: relative;
  }
  .screen-loader .ring svg { position: absolute; inset: 0; animation: rotate-slow 2.4s linear infinite; }
  @keyframes mark-breathe {
    0%, 100% { transform: scale(0.94); opacity: 0.84; }
    50%      { transform: scale(1.0);  opacity: 1; }
  }
  .screen-loader .copy {
    font: 900 18px/1 var(--font-display);
    letter-spacing: -0.025em;
    color: #fff;
  }
  .screen-loader .copy .accent {
    font-family: var(--font-accent);
    font-style: italic;
    font-weight: 900;
    color: #FFD633;
  }

  /* ───── 6. STEP CHIP (inline status) ─────
     Pill with bouncing accent — used inline in lists/buttons */
  .step-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #FFFFFF;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 999px;
    padding: 8px 14px;
    font: 500 13px/1 var(--font-body);
    color: var(--fg-1);
    letter-spacing: -0.005em;
  }
  .step-chip .arc {
    width: 14px; height: 14px;
    animation: rotate-slow 1.4s linear infinite;
  }
</style>
</head><body><div class="card" style="padding: 18px 22px; gap: 18px; min-height: auto">

  <header class="row" style="justify-content:space-between; align-items:baseline">
    <h3>Loaders</h3>
    <span class="lbl" style="font-size:11px">Branded states — logomark, adventure bar, streak pulse, dot trail</span>
  </header>

  <!-- Inline loaders, paired with names below -->
  <div class="loader-grid">

    <!-- Logomark spinner (small) -->
    <div class="loader-cell">
      <div class="logomark-spinner is-mini">
        <svg class="logomark-svg" viewBox="0 0 248 166" fill="currentColor">
          <path d="M 248 106 L 167.46 106 L 224.41 49.05 L 198.95 23.59 L 142 80.54 L 142 0 L 106 0 L 106 80.54 L 49.05 23.59 L 23.59 49.05 L 80.54 106 L 0 106 L 0 142 L 90.04 142 C 98.85 142 106 149.14 106 157.96 L 106 166 L 142 166 L 142 157.96 C 142 149.15 149.14 142 157.96 142 L 248 142 L 248 106 Z" fill-rule="evenodd"/>
        </svg>
      </div>
      <span class="loader-name">Logomark · inline</span>
    </div>

    <!-- Adventure bar -->
    <div class="loader-cell">
      <div class="adventure-bar">
        <div class="fill" style="width: 45%"></div>
        <div class="spark" style="left: 45%">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.39 6.95L21.5 9l-5.5 4 2 7.5-6-4.5-6 4.5 2-7.5L2.5 9l7.11-.05L12 2z"/></svg>
        </div>
      </div>
      <span class="loader-name">Adventure bar</span>
    </div>

    <!-- Streak pulse -->
    <div class="loader-cell">
      <div class="streak">
        <span class="streak-tile"></span>
        <span class="streak-tile"></span>
        <span class="streak-tile"></span>
        <span class="streak-tile"></span>
        <span class="streak-tile"></span>
        <span class="streak-tile"></span>
        <span class="streak-tile"></span>
      </div>
      <span class="loader-name">Streak pulse</span>
    </div>

    <!-- Dot trail on ink -->
    <div class="loader-cell loader-ink">
      <div class="dot-trail">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <span class="loader-name">Dot trail</span>
    </div>

  </div>

  <!-- ─── Full screen loader + inline chip ─────────────────── -->
  <div class="row" style="gap:14px; align-items:stretch">
    <!-- Screen take-over -->
    <div class="screen-loader" style="flex: 1.5">
      <div class="logomark-spinner">
        <svg class="logomark-svg" viewBox="0 0 248 166" fill="currentColor">
          <path d="M 248 106 L 167.46 106 L 224.41 49.05 L 198.95 23.59 L 142 80.54 L 142 0 L 106 0 L 106 80.54 L 49.05 23.59 L 23.59 49.05 L 80.54 106 L 0 106 L 0 142 L 90.04 142 C 98.85 142 106 149.14 106 157.96 L 106 166 L 142 166 L 142 157.96 C 142 149.15 149.14 142 157.96 142 L 248 142 L 248 106 Z" fill-rule="evenodd"/>
        </svg>
      </div>
      <div class="copy">loading your <span class="accent">adventure</span>…</div>
    </div>

    <!-- Inline status chip -->
    <div style="flex: 1; background: var(--engu-cream); border-radius: 14px; padding: 24px 14px 14px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; gap: 18px">
      <div class="col" style="gap:10px; align-items:center">
        <div class="step-chip">
          <svg class="arc" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9" stroke="rgba(0,0,0,0.1)" stroke-width="2.5"/>
            <path d="M21 12 a9 9 0 0 0-9-9" stroke="var(--engu-green)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          </svg>
          Saving progress
        </div>
        <div class="step-chip" style="background: var(--engu-green-ink); color: #fff; border-color: transparent">
          <svg class="arc" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9" stroke="rgba(255,255,255,0.18)" stroke-width="2.5"/>
            <path d="M21 12 a9 9 0 0 0-9-9" stroke="#FFD633" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          </svg>
          Syncing 12 of 20
        </div>
      </div>
      <span class="loader-name">Status chip · inline</span>
    </div>
  </div>

</div></body></html>
