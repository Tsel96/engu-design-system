<!doctype html>
<!-- @dsCard group="Components" name="Feedback · Bottom sheet" subtitle="Mobile filter sheet" viewport="700x420" -->
<html><head><meta charset="utf-8"><title>Bottom sheet</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 18px 22px; gap: 14px; min-height: auto; }
  section { display: flex; flex-direction: column; gap: 10px; }
  h3 { margin: 0; font: 700 14px/1 var(--font-body); color: var(--fg-1); letter-spacing: -0.005em; }
  .cap { font: 500 11px/1 var(--font-body); letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); }
  .ico { width: 16px; height: 16px; flex-shrink: 0; }
  .ico-20 { width: 20px; height: 20px; flex-shrink: 0; }
  .ico-24 { width: 24px; height: 24px; flex-shrink: 0; }
</style>
</head><body><div class="card">
  <div style="background:rgba(18,33,25,0.5); border-radius:24px 24px 16px 16px; padding:24px 0 0; display:flex; flex-direction:column; max-width:380px; margin:0 auto">
    <div style="flex:1"></div>
    <div style="background:#fff; border-radius:24px 24px 0 0; padding:8px 20px 20px; display:flex; flex-direction:column; gap:14px">
      <div style="width:36px; height:4px; background:rgba(0,0,0,0.18); border-radius:999px; margin:0 auto 8px"></div>
      <h3 style="margin:0; font:900 22px/1 var(--font-display); letter-spacing:-0.025em; color:var(--engu-green-ink)">Filter adventures</h3>
      <div class="col" style="gap:8px">
        <label style="display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:10px; background:var(--engu-cream); cursor:pointer">
          <span style="width:22px; height:22px; border-radius:5px; background:#fff; border:1px solid #5AA57C; display:flex; align-items:center; justify-content:center; color:#36634A"><svg class="ico" viewBox="0 0 24 24" fill="none"><use href="../assets/icons/engu-icons-sprite.svg#engu-checkmark-1"/></svg></span>
          <span style="flex:1; font:600 14px/1 'Inter Display'; color:var(--fg-1)">Ages 9–11</span>
        </label>
        <label style="display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:10px; cursor:pointer">
          <span style="width:22px; height:22px; border-radius:5px; background:#fff; border:1px solid rgba(0,0,0,0.2)"></span>
          <span style="flex:1; font:500 14px/1 'Inter Display'; color:var(--fg-1)">Co-op</span>
        </label>
        <label style="display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:10px; cursor:pointer">
          <span style="width:22px; height:22px; border-radius:5px; background:#fff; border:1px solid rgba(0,0,0,0.2)"></span>
          <span style="flex:1; font:500 14px/1 'Inter Display'; color:var(--fg-1)">Logic</span>
        </label>
      </div>
      <button style="background:#FFEB99; color:#332900; border:1px solid rgba(0,0,0,0.1); padding:14px; border-radius:999px; font:700 14px/1 'Inter Display'; cursor:pointer; box-shadow:var(--shadow-button)">Apply 1 filter</button>
    </div>
  </div>
</div></body></html>
