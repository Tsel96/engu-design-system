<!doctype html>
<!-- @dsCard group="Components" name="Inputs · Password" subtitle="Masked + reveal + strength meter" viewport="700x280" -->
<html><head><meta charset="utf-8"><title>Password input</title>
<link rel="stylesheet" href="_card.css">
<style>
  /* Canonical engu input — pill, floating label, trailing eye toggle */
  .field-stack { display: flex; flex-direction: column; align-items: stretch; gap: 8px; width: 320px; }
  .field-shell {
    position: relative; background: #FFFFFF;
    border: 1px solid rgba(0,0,0,0.08); border-radius: 999px;
    padding: 16px 24px; min-height: 72px;
    display: flex; align-items: center;
  }
  .field-shell.focused { border: 1.5px solid var(--engu-green); padding: 15.5px 23.5px; box-shadow: 0 0 0 4px rgba(90,165,124,0.15); }
  .field-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 4px; min-width: 0; }
  .field-label { font: 500 13px/1.2 var(--font-body); color: rgba(0,0,0,0.5); letter-spacing: -0.005em; }
  .field-value { font: 700 18px/1.2 var(--font-body); color: rgba(0,0,0,0.92); letter-spacing: -0.01em; background: transparent; border: 0; outline: none; padding: 0; width: 100%; }
  .field-value.masked { letter-spacing: 0.08em; }
  .field-icon {
    flex-shrink: 0;
    margin-left: 16px;
    width: 24px; height: 24px;
    color: rgba(0,0,0,0.7);
    background: transparent; border: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0;
  }
  .field-shell.focused .field-icon { color: var(--engu-green); }
  .field-desc { font: 500 13px/1.3 var(--font-body); color: rgba(0,0,0,0.5); letter-spacing: -0.005em; padding-left: 4px; }
  .field-desc.ok { color: var(--engu-green-text); }
  .strength {
    display: flex; gap: 4px; padding: 4px 4px 0;
  }
  .strength i { flex: 1; height: 4px; border-radius: 999px; background: rgba(0,0,0,0.08); }
  .strength i.on { background: var(--engu-green); }
</style>
</head><body><div class="card" style="padding: 24px">
  <div style="display:grid; grid-template-columns: repeat(2, 320px); gap: 16px 24px; justify-content: center">

    <!-- Masked -->
    <div class="field-stack">
      <label class="field-shell">
        <div class="field-body">
          <span class="field-label">Password</span>
          <input class="field-value masked" type="password" value="••••••••••">
        </div>
        <button class="field-icon" type="button" aria-label="show password">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><use href="../assets/icons/engu-icons-sprite.svg#engu-eye-open"/></svg>
        </button>
      </label>
      <span class="field-desc">8 characters min · letters and a number</span>
    </div>

    <!-- Revealed (focused) -->
    <div class="field-stack">
      <label class="field-shell focused">
        <div class="field-body">
          <span class="field-label">Password</span>
          <input class="field-value" type="text" value="parent2026">
        </div>
        <button class="field-icon" type="button" aria-label="hide password">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><use href="../assets/icons/engu-icons-sprite.svg#engu-eye-slash"/></svg>
        </button>
      </label>
      <div class="strength">
        <i class="on"></i><i class="on"></i><i class="on"></i><i></i>
      </div>
      <span class="field-desc ok">Strong</span>
    </div>

  </div>

  <div class="cap" style="text-align:center; padding-top: 6px; font: 500 11px/1 var(--font-body); letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3)">
    Pill input · eye-open / eye-slash trailing · optional strength meter
  </div>
</div></body></html>
