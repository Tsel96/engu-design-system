<!doctype html>
<!-- @dsCard group="Components" name="Inputs · Upload" subtitle="Drop zone + in-progress file row" viewport="700x300" -->
<html><head><meta charset="utf-8"><title>Upload</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 18px 22px; gap: 14px; min-height: auto; }
  section { display: flex; flex-direction: column; gap: 10px; }
  h3 { margin: 0; font: 700 14px/1 var(--font-body); color: var(--fg-1); letter-spacing: -0.005em; }
  .cap { font: 500 11px/1 var(--font-body); letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); }
  .ico { width: 16px; height: 16px; flex-shrink: 0; }
  .ico-20 { width: 20px; height: 20px; flex-shrink: 0; }
  .ico-24 { width: 24px; height: 24px; flex-shrink: 0; }
</style>
</head><body><div class="card">
  <div class="col" style="gap:14px; max-width:480px; margin:0 auto; width:100%">
    <div style="background:#fff; border:1.5px dashed rgba(0,0,0,0.2); border-radius:18px; padding:32px 24px; display:flex; flex-direction:column; align-items:center; gap:10px; text-align:center">
      <div style="width:48px; height:48px; border-radius:999px; background:var(--engu-cream); display:flex; align-items:center; justify-content:center; color:var(--engu-green-text)"><svg class="ico-24" viewBox="0 0 24 24" fill="none"><use href="../assets/icons/engu-icons-sprite.svg#engu-cloud-upload"/></svg></div>
      <div style="font:700 15px/1.3 'Inter Display'; color:var(--fg-1)">Drop a file or <span style="color:var(--engu-green-text); text-decoration:underline">browse</span></div>
      <div style="font:500 12px/1.3 'Inter Display'; color:var(--fg-3)">PNG · JPG · PDF · up to 10MB</div>
    </div>
    <div style="background:#fff; border:1px solid rgba(0,0,0,0.06); border-radius:14px; padding:12px 14px; display:flex; align-items:center; gap:12px">
      <div style="width:36px; height:36px; border-radius:8px; background:var(--engu-cream); display:flex; align-items:center; justify-content:center; color:var(--engu-green-text)"><svg class="ico-20" viewBox="0 0 24 24" fill="none"><use href="../assets/icons/engu-icons-sprite.svg#engu-image-alt-text"/></svg></div>
      <div style="flex:1; min-width:0">
        <div style="font:700 13px/1.3 'Inter Display'; color:var(--fg-1)">school-photo-2026.png</div>
        <div style="display:flex; align-items:center; gap:8px">
          <div style="flex:1; height:4px; background:#E6E6E6; border-radius:999px; overflow:hidden"><div style="width:72%; height:100%; background:var(--engu-green)"></div></div>
          <span style="font:500 11px/1 'Inter Display'; color:var(--fg-3)">2.1 / 2.9 MB</span>
        </div>
      </div>
      <button style="background:none; border:none; cursor:pointer; color:var(--fg-3); display:flex"><svg class="ico" viewBox="0 0 24 24" fill="none"><use href="../assets/icons/engu-icons-sprite.svg#engu-cross-medium"/></svg></button>
    </div>
  </div>
</div></body></html>
