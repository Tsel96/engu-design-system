<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing · Scale" subtitle="0 / 2 / 4 / 8 / 12 / 16 / 24 / 32 / 48 / 96" viewport="700x180" -->
<html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  /* From brand-foundation tokens: 0, 2, 4, 8, 12, 16, 24, 32, 48, 96, 124.
     Intermediate values (20, 40, 64, 80) added for completeness. */
  table { border-collapse: separate; border-spacing: 0; width: 100%; }
  td { padding: 6px 8px; vertical-align: middle; }
  th { padding: 6px 8px; font: 500 10px/1 var(--font-body); letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-3); text-align: left; }
  .tok { font: 700 12px/1 var(--font-body); color: var(--fg-1); letter-spacing: -0.005em; }
  .px  { font: 500 12px/1 ui-monospace, Menlo, monospace; color: var(--fg-2); }
  .bar { background: var(--engu-green); height: 16px; border-radius: 4px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 32px; }
</style>
</head><body><div class="card" style="padding: 16px 24px; gap: 8px; min-height: auto">
  <div class="grid2">
    <table>
      <thead><tr><th>Token</th><th>Px</th><th style="width:100%">Visual</th></tr></thead>
      <tbody>
        <tr><td class="tok">space-0</td>  <td class="px">0</td>   <td><div class="bar" style="width:0"></div></td></tr>
        <tr><td class="tok">space-1</td>  <td class="px">2</td>   <td><div class="bar" style="width:2px"></div></td></tr>
        <tr><td class="tok">space-2</td>  <td class="px">4</td>   <td><div class="bar" style="width:4px"></div></td></tr>
        <tr><td class="tok">space-3</td>  <td class="px">8</td>   <td><div class="bar" style="width:8px"></div></td></tr>
        <tr><td class="tok">space-4</td>  <td class="px">12</td>  <td><div class="bar" style="width:12px"></div></td></tr>
        <tr><td class="tok">space-5</td>  <td class="px">16</td>  <td><div class="bar" style="width:16px"></div></td></tr>
        <tr><td class="tok">space-6</td>  <td class="px">20</td>  <td><div class="bar" style="width:20px"></div></td></tr>
        <tr><td class="tok">space-7</td>  <td class="px">24</td>  <td><div class="bar" style="width:24px"></div></td></tr>
      </tbody>
    </table>
    <table>
      <thead><tr><th>Token</th><th>Px</th><th style="width:100%">Visual</th></tr></thead>
      <tbody>
        <tr><td class="tok">space-8</td>  <td class="px">32</td>  <td><div class="bar" style="width:32px"></div></td></tr>
        <tr><td class="tok">space-9</td>  <td class="px">40</td>  <td><div class="bar" style="width:40px"></div></td></tr>
        <tr><td class="tok">space-10</td> <td class="px">48</td>  <td><div class="bar" style="width:48px"></div></td></tr>
        <tr><td class="tok">space-11</td> <td class="px">64</td>  <td><div class="bar" style="width:64px"></div></td></tr>
        <tr><td class="tok">space-12</td> <td class="px">80</td>  <td><div class="bar" style="width:80px"></div></td></tr>
        <tr><td class="tok">space-13</td> <td class="px">96</td>  <td><div class="bar" style="width:96px"></div></td></tr>
        <tr><td class="tok">space-14</td> <td class="px">124</td> <td><div class="bar" style="width:124px"></div></td></tr>
      </tbody>
    </table>
  </div>
  <div class="cap" style="text-align:center">15 tokens · 4-pt base · figma values bolded · intermediate 20/40/64/80 added for completeness</div>
</div></body></html>
