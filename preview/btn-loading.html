<!doctype html>
<!-- @dsCard group="Components" name="Buttons · Loading state" subtitle="Idle × loading · all 4 emphasis levels" viewport="760x240" -->
<html><head><meta charset="utf-8"><title>Buttons · loading state</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 20px 24px; gap: 14px; min-height: auto; }
  h3 { margin: 0; font: 700 14px/1 var(--font-body); color: var(--color-fg-primary); letter-spacing: -0.005em; }
  .cap { font: 500 11px/1 var(--font-body); letter-spacing: 0.14em; text-transform: uppercase; color: var(--color-fg-tertiary); }
  .ico { width: 16px; height: 16px; flex-shrink: 0; }
  .ico-20 { width: 20px; height: 20px; flex-shrink: 0; }
  .ico-24 { width: 24px; height: 24px; flex-shrink: 0; }
</style>
</head><body><div class="card">
<style>
  @keyframes engu-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
    30%           { transform: translateY(-5px); opacity: 1; }
  }
  .btn {
    border: 0; cursor: pointer; font-family: var(--font-body); font-weight: 700;
    letter-spacing: -0.005em; border-radius: var(--radius-pill);
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px; padding: 0 24px; height: 54px; font-size: 16px;
    transition: background var(--dur-micro) var(--ease-out);
  }
  .btn.primary { background: var(--_yellow-200); color: var(--_yellow-900); border: 1px solid var(--color-border-default); box-shadow: var(--shadow-button); }
  .btn.secondary { background: #FFFFFF; color: rgba(0,0,0,0.8); border: 1px solid var(--color-border-default); }
  .btn.tertiary { background: transparent; color: rgba(0,0,0,0.8); }
  .btn.danger { background: var(--color-intent-error); color: #fff; }
  .btn.loading {
    pointer-events: none;
    color: transparent;
    position: relative;
  }
  .btn.loading .dots {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    gap: 6px;
  }
  .btn.loading .dots span {
    width: 7px; height: 7px; border-radius: 999px;
    animation: engu-bounce 1.1s cubic-bezier(0.45, 0, 0.55, 1) infinite;
  }
  .btn.loading .dots span:nth-child(1) { animation-delay: 0s; }
  .btn.loading .dots span:nth-child(2) { animation-delay: 0.16s; }
  .btn.loading .dots span:nth-child(3) { animation-delay: 0.32s; }
  .btn.primary.loading   .dots span { background: var(--_yellow-900); }
  .btn.secondary.loading .dots span { background: rgba(0,0,0,0.7); }
  .btn.tertiary.loading  .dots span { background: rgba(0,0,0,0.6); }
  .btn.danger.loading    .dots span { background: #fff; }
  .row-c { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .row-lbl { font: 600 11px/1 var(--font-body); color: var(--color-fg-tertiary); letter-spacing: -0.005em; width: 80px; flex-shrink: 0; }
  .panel { background: var(--color-bg-tinted); border-radius: var(--radius-md); padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; }
</style>

  <div class="panel">
    <div class="row-c">
      <span class="row-lbl">Idle</span>
      <button class="btn primary">Save changes</button>
      <button class="btn secondary">Cancel</button>
      <button class="btn tertiary">Skip</button>
      <button class="btn danger">Delete</button>
    </div>
    <div class="row-c">
      <span class="row-lbl">Loading</span>
      <button class="btn primary loading">Save changes<span class="dots"><span></span><span></span><span></span></span></button>
      <button class="btn secondary loading">Cancel<span class="dots"><span></span><span></span><span></span></span></button>
      <button class="btn tertiary loading">Skip<span class="dots"><span></span><span></span><span></span></span></button>
      <button class="btn danger loading">Delete<span class="dots"><span></span><span></span><span></span></span></button>
    </div>
  </div>
  <div class="cap" style="text-align: center; padding-top: 6px">Width preserved · 3-dot bounce · 1.1s · 160ms stagger · pointer-events off</div>
</div></body></html>
