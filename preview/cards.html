       <div class="row" style="gap:6px; margin-top:auto"><span style="background:#FFD633; color:#332900; font:500 11px/1 'Inter Display'; letter-spacing:0.14em; text-transform:uppercase; padding:6px 10px; border-radius:999px">New</span></div>
