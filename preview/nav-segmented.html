<!doctype html>
<!-- @dsCard group="Components" name="Nav · Segmented control" subtitle="Light + ink variants" viewport="700x200" -->
<html><head><meta charset="utf-8"><title>Segmented control</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 18px 22px; gap: 14px; min-height: auto; }
  section { display: flex; flex-direction: column; gap: 10px; }
  h3 { margin: 0; font: 700 14px/1 var(--font-body); color: var(--fg-1); letter-spacing: -0.005em; }
  .cap { font: 500 11px/1 var(--font-body); letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); }
  .ico { width: 16px; height: 16px; flex-shrink: 0; }
  .ico-20 { width: 20px; height: 20px; flex-shrink: 0; }
  .ico-24 { width: 24px; height: 24px; flex-shrink: 0; }
</style>
</head><body><div class="card">
  <div class="col" style="gap:14px; align-items:center">
    <div style="display:inline-flex; background:rgba(0,0,0,0.05); padding:4px; border-radius:999px; gap:4px">
      <button style="background:#fff; border:none; padding:8px 18px; border-radius:999px; font:700 13px/1 'Inter Display'; color:var(--fg-1); cursor:pointer; box-shadow:0 1px 2px rgba(0,0,0,0.08)">Day</button>
      <button style="background:transparent; border:none; padding:8px 18px; border-radius:999px; font:500 13px/1 'Inter Display'; color:var(--fg-2); cursor:pointer">Week</button>
      <button style="background:transparent; border:none; padding:8px 18px; border-radius:999px; font:500 13px/1 'Inter Display'; color:var(--fg-2); cursor:pointer">Month</button>
      <button style="background:transparent; border:none; padding:8px 18px; border-radius:999px; font:500 13px/1 'Inter Display'; color:var(--fg-2); cursor:pointer">Year</button>
    </div>
    <div style="display:inline-flex; background:var(--engu-green-ink); padding:4px; border-radius:12px; gap:4px">
      <button style="background:var(--engu-green); border:none; padding:8px 14px; border-radius:8px; font:700 13px/1 'Inter Display'; color:#fff; cursor:pointer">Parent</button>
      <button style="background:transparent; border:none; padding:8px 14px; border-radius:8px; font:500 13px/1 'Inter Display'; color:rgba(255,255,255,0.7); cursor:pointer">Teacher</button>
    </div>
  </div>
</div></body></html>
