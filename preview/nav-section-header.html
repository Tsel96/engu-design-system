<!doctype html>
<!-- @dsCard group="Components" name="Nav · Section header" subtitle="Headline + show-all and stat row" viewport="700x220" -->
<html><head><meta charset="utf-8"><title>Section header</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 18px 22px; gap: 14px; min-height: auto; }
  section { display: flex; flex-direction: column; gap: 10px; }
  h3 { margin: 0; font: 700 14px/1 var(--font-body); color: var(--fg-1); letter-spacing: -0.005em; }
  .cap { font: 500 11px/1 var(--font-body); letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); }
  .ico { width: 16px; height: 16px; flex-shrink: 0; }
  .ico-20 { width: 20px; height: 20px; flex-shrink: 0; }
  .ico-24 { width: 24px; height: 24px; flex-shrink: 0; }
</style>
</head><body><div class="card">
  <div class="col" style="gap:18px; max-width:520px; margin:0 auto; width:100%">
    <div class="row" style="justify-content:space-between; align-items:baseline">
      <h2 style="margin:0; font:900 24px/1 var(--font-display); letter-spacing:-0.025em; color:var(--engu-green-ink)">News and events</h2>
      <button style="background:none; border:none; color:var(--engu-green-text); font:600 13px/1 'Inter Display'; cursor:pointer">Show all →</button>
    </div>
    <div class="row" style="justify-content:space-between; align-items:flex-end">
      <div>
        <div class="cap">May</div>
        <h2 style="margin:4px 0 0; font:900 20px/1 var(--font-display); letter-spacing:-0.02em; color:var(--engu-green-ink)">This week</h2>
      </div>
      <div style="font:500 13px/1 'Inter Display'; color:var(--fg-2)">12 adventures · 4 hours</div>
    </div>
  </div>
</div></body></html>
