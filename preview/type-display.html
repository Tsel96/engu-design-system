<!doctype html>
<!-- @dsCard group="Spacing" name="Type · Display" subtitle="Apparat Heavy 64–84" viewport="700x160" -->
<html><head><meta charset="utf-8"><title>Display type</title>
<link rel="stylesheet" href="_card.css">
<style>
  /* Apparat in Adobe Typekit may not ship the Heavy weight cleanly,
     so we tighten with text-stroke to guarantee a heavy rendering. */
  .display {
    font-family: var(--font-display);
    font-weight: 900;
    font-stretch: 110%;
    line-height: 0.84;
    letter-spacing: -0.04em;
    color: var(--engu-green);
    -webkit-text-stroke: 0.6px currentColor;
    text-rendering: optimizeLegibility;
  }
</style>
</head><body><div class="card" style="padding:22px 24px">
  <div class="display" style="font-size:84px">play to learn</div>
  <div class="row" style="gap:18px; padding-top:2px">
    <span class="cap">Apparat Heavy 900</span>
    <span class="lbl">84 / 84%</span>
    <span class="lbl">−4% tracking</span>
    <span class="lbl">lowercase</span>
  </div>
</div></body></html>
